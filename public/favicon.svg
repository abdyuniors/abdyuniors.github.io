<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <title>AJS - Abdyunior Januar Suek Monogram</title>
    <defs>
        <!-- Gradien warna Indigo ke Teal agar senada dengan tema portofolio Anda -->
        <linearGradient x1="0%" y1="0%" x2="100%" y2="100%" id="linearGradient-1">
            <stop stop-color="#818CF8" offset="0%"></stop> <!-- indigo-400 -->
            <stop stop-color="#2DD4BF" offset="100%"></stop> <!-- teal-400 -->
        </linearGradient>
    </defs>
    <g id="Page-1" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <g id="AJS-Favicon">
            <!-- Latar belakang lingkaran gelap (Slate 950) agar menonjol di mode terang/gelap browser -->
            <circle id="Background" fill="#020617" cx="256" cy="256" r="256"></circle>
            
            <!-- Simbol Monogram AJS -->
            <g id="Monogram" transform="translate(106.000000, 116.000000)" fill="url(#linearGradient-1)">
                <!-- Bentuk Dasar: Kombinasi A (panah atas), J (lengkung bawah), S (aliran geometris) -->
                <path d="M149.7,0 L0,279.7 L59.1,279.7 L149.7,110.2 L240.3,279.7 L299.4,279.7 L149.7,0 Z M149.7,163.7 L106.3,244.9 L193.1,244.9 L149.7,163.7 Z" id="Shape-A" transform="translate(149.700000, 139.850000) rotate(-180.000000) translate(-149.700000, -139.850000) "></path>
                <path d="M150,56 C150,56 226,56 266,56 C288.1,56 300,73.9 300,96 L300,216 C300,260.2 264.2,296 220,296 L150,296 L150,236 L220,236 C231,236 240,227 240,216 L240,116 L150,116 L150,56 Z" id="Shape-J-S-Merge"></path>
            </g>
        </g>
    </g>
</svg>
