name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Kita paksa GitHub memakai Node.js versi 22
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 2. Instal semua paket npm secara manual
      - name: Install dependencies
        run: npm install

      # 3. Build Astro secara manual
      - name: Build Astro
        run: npm run build

      # 4. Unggah hasilnya ke GitHub Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
